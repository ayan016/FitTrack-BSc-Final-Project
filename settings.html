<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack | Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <h2 style="text-align: center; color: #2ecc71; font-size: 28px; margin-top: 30px; margin-bottom: 5px;">FitTrack</h2>
        <p style="text-align: center; color: #7f8c8d; font-size: 13px; margin-bottom: 40px; margin-top: 0;">Health & Budget</p>
        <ul class="nav-links">
            <li><a href="index.html">📊 Dashboard</a></li>
            <li><a href="analytics.html">📈 Analytics</a></li>
            <li><a href="meals.html">🥗 Meal Hub</a></li>
            <li><a href="settings.html" class="active">⚙️ Settings</a></li>
        </ul>
    </nav>

    <main id="analytics-main" style="padding: 40px 20px;">
        <div style="max-width: 600px; margin: 0 auto;">

            <div id="sync-status" style="display: none; background: #d4edda; color: #155724; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 600;">
                ✅ Settings saved successfully!
            </div>

            <section style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);">
                <h2 style="margin-top: 0; border-bottom: 2px solid #f4f7f6; padding-bottom: 15px; margin-bottom: 25px; color: #2c3e50;">Account Settings</h2>

                <h3 style="color: #27ae60; font-size: 15px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;">Profile</h3>
                <div class="input-group">
                    <label>First Name:</label>
                    <input type="text" id="setting-name" placeholder="e.g. Ayan">
                </div>
                <div class="input-group">
                    <label>Height (cm):</label>
                    <input type="number" id="setting-height" placeholder="e.g. 175" min="100" max="250">
                </div>

                <h3 style="color: #27ae60; font-size: 15px; margin-top: 30px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;">Fitness Goals</h3>
                <div class="input-group">
                    <label>Starting Weight (kg):</label>
                    <input type="number" id="setting-start-weight" placeholder="e.g. 83" min="30" max="300">
                </div>
                <div class="input-group">
                    <label>Target Weight (kg):</label>
                    <input type="number" id="setting-target-weight" placeholder="e.g. 75" min="30" max="300">
                </div>

                <h3 style="color: #27ae60; font-size: 15px; margin-top: 30px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;">Budget</h3>
                <div class="input-group">
                    <label>Monthly Allowance (PKR):</label>
                    <input type="number" id="setting-allowance" placeholder="e.g. 15000" min="1">
                </div>

                <div style="display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap;">
                    <button type="button" id="save-settings" style="flex: 1;">Save & Sync to Cloud</button>
                    <button type="button" id="clear-data" style="flex: 1; background: linear-gradient(135deg, #e74c3c, #c0392b); box-shadow: 0 4px 12px rgba(231,76,60,0.3);">Clear All Local Data</button>
                </div>

                <p style="color: #7f8c8d; font-size: 12px; margin-top: 15px; text-align: center;">
                    Your data is synced to the cloud and linked to this browser session.
                </p>
            </section>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    const app = initializeApp({ apiKey: "AIzaSyA2c9lMr-knuLL1r8CRW_MvtMM1hqSP6gU", authDomain: "fittrack-b0ee8.firebaseapp.com", projectId: "fittrack-b0ee8", storageBucket: "fittrack-b0ee8.firebasestorage.app", messagingSenderId: "968942652478", appId: "1:968942652478:web:fe4eb034783068966f956f" });
    const auth = getAuth(app);
    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = 'login.html'; });
</script>
</body>
</html>
